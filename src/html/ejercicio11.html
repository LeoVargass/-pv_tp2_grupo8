<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11</title>
</head>
<body>
    <script>
        let kilometros = parseFloat(prompt("Ingrese la cantidad de kilómetros recorridos:"));
        
        while (isNaN(kilometros) || kilometros <= 0) {
            kilometros = parseFloat(prompt("Por favor, ingrese un número válido mayor a 0 para los kilómetros:"));
        }
        
        let litros = parseFloat(prompt("Ingrese la cantidad de litros de combustible consumidos:"));
        
        while (isNaN(litros) || litros <= 0) {
            litros = parseFloat(prompt("Por favor, ingrese un número válido mayor a 0 para los litros:"));
        }
        
        const consumoPorKm = litros / kilometros;
        
        document.write(`
            <h2>Consumo de Combustible</h2>
            <p><strong>Kilómetros recorridos:</strong> ${kilometros} km</p>
            <p><strong>Litros consumidos:</strong> ${litros} L</p>
            <p><strong>Consumo por kilómetro:</strong> ${consumoPorKm.toFixed(3)} L/km</p>
            <p><strong>Consumo cada 100 km:</strong> ${(consumoPorKm * 100).toFixed(2)} L/100km</p>
        `);
    </script>
</body>
</html>
