<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 18</title>
</head>
<body>

    <script>
        const calcularMayor = (numero1, numero2) => {
            if (numero1 > numero2) {
                document.write(`El número mayor es: ${numero1}`);
            } else if (numero2 > numero1) {
                document.write(`El número mayor es: ${numero2}`);
            } else {
                document.write(`Los números ingresados son iguales.`);
            }
        };

        const numero1 = parseInt(prompt("Ingrese el primer número:"));
        const numero2 = parseInt(prompt("Ingrese el segundo número:"));

        calcularMayor(numero1, numero2);
    </script>

</body>
</html>
