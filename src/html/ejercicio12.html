<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 12</title>
</head>
<body>

<script>
    const numero = parseInt(prompt("Ingrese un número")); // parseInt convierte el valor ingresado a un número entero // prompt muestra un cuadro de diálogo para que el usuario ingrese un valor

    if (numero % 2 === 0) {
        document.write(`El número ${numero} es PAR`);
    } else {
        document.write(`El número ${numero} es IMPAR`);
    }
</script>

</body>
</html>
