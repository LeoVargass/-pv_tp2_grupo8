<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 19 - Lenguajes de Programación</title>
    <link rel="stylesheet" href="./ejercicio19.css">
</head>
<body>
    <div class="container">
        <h1>Lenguajes de Programación</h1>
        <p class="subtitulo">Seleccioná un lenguaje para ver su descripción</p>

        <div class="opciones">
            <label class="opcion-label">
                <input type="radio" name="lenguaje" value="javascript">
                JavaScript
            </label>
            <label class="opcion-label">
                <input type="radio" name="lenguaje" value="python">
                Python
            </label>
            <label class="opcion-label">
                <input type="radio" name="lenguaje" value="java">
                Java
            </label>
            <label class="opcion-label">
                <input type="radio" name="lenguaje" value="cpp">
                C++
            </label>
            <label class="opcion-label">
                <input type="radio" name="lenguaje" value="typescript">
                TypeScript
            </label>
        </div>

        <p class="label-resultado">Resultado</p>
        <div class="resultado-box">
            <p id="resultado">Seleccioná un lenguaje para ver su descripción.</p>
        </div>
    </div>

    <script type="module" src="./ejercicio19.js"></script>
</body>
</html>
