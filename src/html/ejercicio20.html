<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 20</title>
    <link rel="stylesheet" href="../../assets/css/ejercicio20.css">
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Registro</h1>
            <p class="Subtitle">Complete los datos</p>

            <form id="form-carga">

                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Ingrese un nombre" required>
                </div>

                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" placeholder="Ingrese un apellido" required>
                </div>

                <div class="form-group">
                    <label for="LU">Libreta Universitaria</label>
                    <input type="number" max="999" min="99"  id="LU" placeholder="Ingrese un número de LU" required>
                </div>
                <button type="submit" id="btn-procesar" >Registrar Estudiante</button>
            </form>
        </section>

        
        <section id="resultado" class="display-area"></section>

    </main>
    <script type="module" src="../js/ejercicio20.js" > </script>
</body>
</html>
